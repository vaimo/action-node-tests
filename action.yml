name: 'Node - Tests'
description: 'This action is used to execute tests.'
author: Patryk Waluś <patryk.walus@vaimo.com>
inputs:
  package-manager:
    description: 'Package manager to use. Supported values: npm, yarn, pnpm.'
    required: true
  junit-test-report-path:
    description: 'Select directories where junit report is located (separated by comma).'
    required: true
    type: string
    default: '*/junit.xml'
  junit-test-coverage-configuration:
    description: 'Name and where coverage report file is located (separated by comma). Applicable only if report is not located in coverage/coverage-summary.json folder.'
    required: false
    type: string
runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        case "${{ inputs.package-manager }}" in
          npm)  npm ci ;;
          yarn) yarn install --frozen-lockfile ;;
          pnpm) pnpm install --frozen-lockfile ;;
          *)    echo "Unsupported package manager: ${{ inputs.package-manager }}" && exit 1 ;;
        esac

    - name: Tests
      shell: bash
      run: |
        case "${{ inputs.package-manager }}" in
          npm)  npm run test:coverage ;;
          yarn) yarn test:coverage ;;
          pnpm) pnpm test:coverage ;;
          *)    echo "Unsupported package manager: ${{ inputs.package-manager }}" && exit 1 ;;
        esac

    - name: Tests Report
      id: test-report
      uses: dorny/test-reporter@v3
      if: success() || failure()
      with:
        name: Tests Report
        path: ${{inputs.junit-test-report-path}}
        reporter: jest-junit

    - name: Tests Coverage
      if: success() || failure()
      uses: MishaKav/jest-coverage-comment@v1
      with:
        create-new-comment: true
        multiple-files: ${{ inputs.junit-test-coverage-configuration != '' && inputs.junit-test-coverage-configuration || null }}
